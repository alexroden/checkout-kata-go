formatter: goimports
log-level: info
template: testify
all: false
recursive: true

packages:
  github.com/alexroden/checkout-kata-go/pkg/repositories:
    config:
      all: true
      dir: internal/mocks/pkg/repositories
      pkgname: mocks
      structname: '{{.Mock}}{{.InterfaceName}}'
      filename: '{{.InterfaceName}}_mock.go'
      recursive: true
      force-file-write: true
  github.com/alexroden/checkout-kata-go/pkg/dynamodb:
    config:
      all: true
      dir: internal/mocks/pkg/dynamodb
      pkgname: mocks
      structname: '{{.Mock}}{{.InterfaceName}}'
      filename: '{{.InterfaceName}}_mock.go'
      recursive: true
      force-file-write: true
  github.com/alexroden/checkout-kata-go/pkg/checkout:
    config:
      all: true
      dir: internal/mocks/pkg/checkout
      pkgname: mocks
      structname: '{{.Mock}}{{.InterfaceName}}'
      filename: '{{.InterfaceName}}_mock.go'
      recursive: true
      force-file-write: true