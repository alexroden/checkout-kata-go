services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
      ssh:
        - default
    depends_on:
      - dynamodb
    volumes:
      - ..:/api
    container_name: kataapi
    working_dir: /api
    env_file: .env
    ports:
      - "8082:8080"
    networks:
      - api_network

networks:
  api_network:
